name: DevOps CI Pipeline (Docker)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Images
        run: | 
          docker-compose build

        -name: Run Containers
        run: |
          docker compose up
--abort-on-container-exit    

